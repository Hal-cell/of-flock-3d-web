<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>of-flock-3d (web)</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      }
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #050608;
        color: #e8eaf0;
        overflow: hidden;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      /* Audio gate — Web Audio 必须用户交互后才能 resume */
      #audio-gate {
        position: fixed;
        inset: 0;
        background: rgba(5, 6, 8, 0.45);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        z-index: 1000;
        cursor: pointer;
        backdrop-filter: blur(3px);
      }
      #audio-gate.hidden { display: none; }
      #audio-gate .title {
        font-size: 56px;
        font-weight: 200;
        letter-spacing: 0.35em;
        opacity: 0.95;
        text-transform: uppercase;
      }
      #audio-gate .sub {
        font-size: 13px;
        font-weight: 300;
        opacity: 0.65;
        letter-spacing: 0.12em;
        max-width: 90vw;
        text-align: center;
        line-height: 1.6;
        white-space: nowrap;
      }
      #audio-gate .sub .author {
        opacity: 0.6;
        font-style: italic;
        margin-left: 4px;
      }
      #audio-gate .hint {
        margin-top: 22px;
        font-size: 10px;
        opacity: 0.3;
        letter-spacing: 0.25em;
        text-transform: uppercase;
      }
      /* HUD overlay */
      #hud {
        position: fixed;
        left: 16px;
        bottom: 12px;
        font-family: "SF Mono", Menlo, Monaco, monospace;
        font-size: 11px;
        opacity: 0.55;
        letter-spacing: 0.04em;
        pointer-events: none;
        z-index: 10;
        line-height: 1.5;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-BvmCS0WW.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">of-flock-3d · web port · P0</div>

    <div id="audio-gate">
      <div class="title">Flock</div>
      <div class="sub">An experiment of motion-based spectromorphological audiovisual composition <span class="author">— made by Hal Xu</span></div>
      <div class="hint">click anywhere to start</div>
    </div>

  </body>
</html>
